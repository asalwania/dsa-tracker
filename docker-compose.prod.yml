version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: dsa-tracker-mongo
    profiles: ['local-db']
    command: ['--replSet', 'rs0', '--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    networks:
      - dsa-network
    restart: always
    healthcheck:
      test: >
        mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-init:
    image: mongo:7
    container_name: dsa-tracker-mongo-init
    profiles: ['local-db']
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - dsa-network
    command: >
      mongosh --host mongo --eval "
        try {
          rs.status();
          print('Replica set already initialized');
        } catch (e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
          print('Replica set initiated');
        }
      "
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: dsa-tracker-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dsa-network
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dsa-tracker-api
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    networks:
      - dsa-network
    restart: always
    expose:
      - '5000'
    ports:
      - '5000:5000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: dsa-tracker-web
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    networks:
      - dsa-network
    restart: always
    expose:
      - '3000'
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  mongo_data:
  redis_data:

networks:
  dsa-network:
    driver: bridge
